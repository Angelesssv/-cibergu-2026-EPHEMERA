<!DOCTYPE html>
<html lang="es">

    <title>EPHEMERA | Registro de Actividad</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="logo.png" alt="Logo de EPHEMERA" class="app-logo">
                <h1 class="logo">EPHEMERA</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Panel</a>
                <a href="huella.html" class="nav-item">Huella Digital</a>
                <a href="incidencias.html" class="nav-item">Incidencias</a>

            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span class="user-name">Miguel T.</span>
                    <span class="user-role">Admin</span>

        <main class="main-content">
            <header class="topbar">
                <h2>Registro de Actividad</h2>

                        <thead>

                                <th>Fecha</th>
