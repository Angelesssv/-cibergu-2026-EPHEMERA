<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPHEMERA | Huella Digital</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="logo.png" alt="Logo de EPHEMERA" class="app-logo">
                <h1 class="logo">EPHEMERA</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Panel</a>
                <a href="huella.html" class="nav-item">Huella Digital</a>
                <a href="incidencias.html" class="nav-item">Incidencias</a>
                <a href="evidencia.html" class="nav-item">Evidencia</a>
                <a href="historial.html" class="nav-item">Historial</a>
                <a href="estado.html" class="nav-item">Estado del Servicio</a>
                <a href="config.html" class="nav-item">Configuración</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2>Gestión de Huella Digital</h2>
            </header>
            
            <div class="view-container">
                <div class="data-table-container card" style="padding: 0;">
                    <div style="display: flex; gap: 1rem; padding: 1.5rem; border-bottom: 1px solid var(--border-primary); background: rgba(17, 24, 39, 0.5);">
                        <button class="btn btn-primary">Reducir Visibilidad</button>
                        <button id="btn-add-element" class="btn btn-secondary">Agregar Elemento</button>
                    </div>
                    
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Tipo</th>
                                <th>Identificador</th>
                                <th>Fuente</th>
                                <th>Estado de Visibilidad</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="table-elements-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
